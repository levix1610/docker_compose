# homarr compose file

services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:1.59.3
    restart: unless-stopped
    ports:
      - "7575:7575"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/appdata/homarr/appdata:/appdata
    environment:
      - SECRET_ENCRYPTION_KEY=${homarr_secret_key} # IMPORTANT: openssl rand -hex 32
      - TZ=America/New_York